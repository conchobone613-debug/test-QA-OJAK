<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestrator Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --bg-card: #141b2d;
    --bg-card-hover: #1a2338;
    --border: #1e293b;
    --border-light: #2d3a50;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.15);
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.1);
    --warning: #f59e0b;
    --warning-bg: rgba(245,158,11,0.1);
    --error: #ef4444;
    --error-bg: rgba(239,68,68,0.1);
    --pending: #64748b;
    --running: #3b82f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,23,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-phase {
    font-size: 13px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .phase-idle { background: rgba(100,116,139,0.2); color: #94a3b8; }
  .phase-classify { background: rgba(139,92,246,0.2); color: #a78bfa; }
  .phase-worktree { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .phase-build { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .phase-merge { background: rgba(34,197,94,0.2); color: #4ade80; }
  .phase-qa { background: rgba(236,72,153,0.2); color: #f472b6; }
  .phase-done { background: rgba(34,197,94,0.2); color: #4ade80; }

  .header-stats {
    display: flex; align-items: center; gap: 20px;
    font-size: 13px; color: var(--text-muted);
  }
  .stat-value { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-cost { color: var(--warning); }

  .connection-indicator {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    transition: all 0.3s;
  }
  .connection-indicator.disconnected {
    background: var(--error);
    box-shadow: 0 0 6px var(--error);
  }

  /* ── Progress Bar ── */
  .progress-section {
    padding: 0 24px; margin-top: 16px;
  }
  .progress-bar-track {
    width: 100%; height: 6px; border-radius: 3px;
    background: var(--border);
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    transition: width 0.5s ease-out;
    position: relative;
  }
  .progress-bar-fill::after {
    content: ''; position: absolute; right: 0; top: 0;
    width: 40px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2));
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }
  .progress-label {
    margin-top: 6px; font-size: 12px; color: var(--text-muted);
    display: flex; justify-content: space-between;
  }

  /* ── Main Layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 16px;
    padding: 16px 24px 24px;
    min-height: calc(100vh - 120px);
  }
  @media (max-width: 960px) {
    .main { grid-template-columns: 1fr; }
  }

  /* ── Group Cards ── */
  .groups-panel h2 {
    font-size: 14px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }
  .group-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 12px;
  }
  .group-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
  .group-card.running { border-color: var(--running); box-shadow: 0 0 12px var(--accent-glow); }
  .group-card.success { border-left: 3px solid var(--success); }
  .group-card.error { border-left: 3px solid var(--error); }
  .group-card.rate_limited { border-left: 3px solid var(--warning); }

  .group-icon {
    font-size: 18px; width: 28px; text-align: center; flex-shrink: 0;
  }
  .group-info { flex: 1; min-width: 0; }
  .group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .group-id { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .group-model {
    font-size: 10px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .model-opus { background: rgba(239,68,68,0.15); color: #f87171; }
  .model-sonnet { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .model-haiku { background: rgba(34,197,94,0.15); color: #4ade80; }
  .group-desc {
    font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .group-duration {
    font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  /* ── Running animation ── */
  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .running-indicator {
    position: relative; width: 18px; height: 18px; flex-shrink: 0;
  }
  .running-indicator::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; background: var(--running);
    animation: pulse-ring 1.5s infinite;
  }
  .running-indicator::after {
    content: ''; position: absolute; inset: 4px;
    border-radius: 50%; background: var(--running);
  }

  /* ── Right Panel ── */
  .right-panel { display: flex; flex-direction: column; gap: 16px; }

  /* ── QA Panel ── */
  .qa-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: none;
  }
  .qa-panel.active { display: block; }
  .qa-panel h3 {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .qa-stat {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .qa-stat:last-child { border: none; }
  .qa-stat-label { color: var(--text-muted); }
  .qa-stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── Log Panel ── */
  .log-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    flex: 1; min-height: 300px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .log-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .log-count {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(59,130,246,0.15); color: #60a5fa;
  }
  .log-body {
    flex: 1; overflow-y: auto; padding: 8px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6;
  }
  .log-line {
    padding: 2px 16px;
    transition: background 0.1s;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-line:hover { background: rgba(255,255,255,0.02); }
  .log-line .ts { color: var(--text-dim); margin-right: 8px; }
  .log-line.error { color: var(--error); }
  .log-line.success { color: var(--success); }
  .log-line.warn { color: var(--warning); }
  .log-line.info { color: var(--text-muted); }
  .log-line.new { animation: flash 0.5s; }
  @keyframes flash {
    0% { background: rgba(59,130,246,0.1); }
    100% { background: transparent; }
  }

  /* ── Current Step Banner ── */
  .current-step {
    padding: 0 24px; margin-bottom: 0;
  }
  .current-step-text {
    font-size: 13px; color: var(--text-muted);
    padding: 10px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .current-step-text .step-icon { font-size: 14px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── Empty State ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; color: var(--text-dim); font-size: 14px;
    gap: 8px;
  }
  .empty-state-icon { font-size: 32px; opacity: 0.5; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-logo">⚡ Orchestrator</span>
    <span id="phase-badge" class="header-phase phase-idle">IDLE</span>
  </div>
  <div class="header-stats">
    <div>⏱ <span id="elapsed" class="stat-value">0:00</span></div>
    <div>📦 <span id="group-progress" class="stat-value">0/0</span></div>
    <div>💰 <span id="cost" class="stat-value stat-cost">$0.00</span></div>
    <div class="connection-indicator" id="conn-indicator" title="Connected"></div>
  </div>
</div>

<!-- Progress Bar -->
<div class="progress-section">
  <div class="progress-bar-track">
    <div id="progress-fill" class="progress-bar-fill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span id="progress-text">대기 중...</span>
    <span id="progress-pct">0%</span>
  </div>
</div>

<!-- Current Step -->
<div class="current-step" style="margin-top:12px">
  <div id="current-step" class="current-step-text">
    <span class="step-icon">💤</span>
    <span>오케스트레이터 대기 중</span>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Left: Group Cards -->
  <div class="groups-panel">
    <h2>워커 그룹</h2>
    <div id="groups-grid" class="groups-grid">
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div>시작 대기 중...</div>
      </div>
    </div>
  </div>

  <!-- Right: QA + Log -->
  <div class="right-panel">
    <!-- QA Panel -->
    <div id="qa-panel" class="qa-panel">
      <h3>🔍 QA 파이프라인</h3>
      <div class="qa-stat">
        <span class="qa-stat-label">라운드</span>
        <span id="qa-round" class="qa-stat-value">—</span>
      </div>
      <div class="qa-stat">
        <span class="qa-stat-label">레이어</span>
        <span id="qa-layer" class="qa-stat-value">—</span>
      </div>
      <div class="qa-stat">
        <span class="qa-stat-label">발견 에러</span>
        <span id="qa-errors-found" class="qa-stat-value" style="color:var(--error)">0</span>
      </div>
      <div class="qa-stat">
        <span class="qa-stat-label">수정 완료</span>
        <span id="qa-errors-fixed" class="qa-stat-value" style="color:var(--success)">0</span>
      </div>
      <div class="qa-stat">
        <span class="qa-stat-label">에스컬레이션</span>
        <span id="qa-escalation" class="qa-stat-value">—</span>
      </div>
    </div>

    <!-- Log Panel -->
    <div class="log-panel">
      <div class="log-header">
        <span>📋 라이브 로그</span>
        <span id="log-count" class="log-count">0</span>
      </div>
      <div id="log-body" class="log-body">
        <div class="empty-state" style="height:100%">
          <div class="empty-state-icon">📝</div>
          <div>로그 대기 중...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let state = {};
let prevLogCount = 0;
let connected = false;
let startTime = null;
let timerInterval = null;

// ── Phase Labels ──
const PHASE_LABELS = {
  idle: 'IDLE', classify: 'CLASSIFY', worktree: 'WORKTREE',
  build: 'BUILD', merge: 'MERGE',
  qa_l1: 'QA L1', qa_l2: 'QA L2', qa_l3: 'QA L3',
  done: 'DONE',
};
const PHASE_ICONS = {
  idle: '💤', classify: '🔍', worktree: '🌿',
  build: '🔨', merge: '🔀',
  qa_l1: '🧪', qa_l2: '🧪', qa_l3: '🧪',
  done: '✅',
};
const PHASE_CSS = {
  idle: 'phase-idle', classify: 'phase-classify', worktree: 'phase-worktree',
  build: 'phase-build', merge: 'phase-merge',
  qa_l1: 'phase-qa', qa_l2: 'phase-qa', qa_l3: 'phase-qa',
  done: 'phase-done',
};

// ── Model Display ──
function modelLabel(model) {
  if (!model) return '';
  if (model.includes('opus')) return 'Opus';
  if (model.includes('sonnet')) return 'Sonnet';
  if (model.includes('haiku')) return 'Haiku';
  return model.split('-').pop();
}
function modelClass(model) {
  if (!model) return '';
  if (model.includes('opus')) return 'model-opus';
  if (model.includes('sonnet')) return 'model-sonnet';
  if (model.includes('haiku')) return 'model-haiku';
  return '';
}

// ── Status Icons ──
function statusIcon(status) {
  switch (status) {
    case 'success': return '✅';
    case 'error': return '❌';
    case 'running': return '';
    case 'rate_limited': return '⏳';
    default: return '⏳';
  }
}

// ── Render Functions ──
function render(s) {
  state = s;
  renderPhase();
  renderProgress();
  renderCurrentStep();
  renderGroups();
  renderQA();
  renderLogs();
  renderCost();
}

function renderPhase() {
  const badge = document.getElementById('phase-badge');
  const phase = state.phase || 'idle';
  badge.textContent = PHASE_LABELS[phase] || phase.toUpperCase();
  badge.className = 'header-phase ' + (PHASE_CSS[phase] || 'phase-idle');
}

function renderProgress() {
  const groups = state.groups || {};
  const total = state.total_groups || Object.keys(groups).length || 0;
  const completed = Object.values(groups).filter(g => g.status === 'success' || g.status === 'error').length;
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('group-progress').textContent = completed + '/' + total;
  document.getElementById('progress-pct').textContent = pct + '%';

  const phase = state.phase || 'idle';
  let text = '대기 중...';
  if (phase === 'classify') text = '과제 분류 중...';
  else if (phase === 'worktree') text = 'Worktree 생성 중...';
  else if (phase === 'build') text = `빌드 진행 중 (${completed}/${total} 완료)`;
  else if (phase === 'merge') text = '자동 머지 + 정리 중...';
  else if (phase.startsWith('qa')) text = `QA 검증 중 (${phase.toUpperCase()})`;
  else if (phase === 'done') text = '작업 완료';
  document.getElementById('progress-text').textContent = text;
}

function renderCurrentStep() {
  const el = document.getElementById('current-step');
  const step = state.current_step || '대기 중';
  const phase = state.phase || 'idle';
  const icon = PHASE_ICONS[phase] || '💤';
  el.innerHTML = `<span class="step-icon">${icon}</span><span>${step}</span>`;
}

function renderGroups() {
  const grid = document.getElementById('groups-grid');
  const groups = state.groups || {};
  const keys = Object.keys(groups);

  if (keys.length === 0) return;

  // Sort: running first, then pending, then success, then error
  const order = { running: 0, rate_limited: 1, pending: 2, success: 3, error: 4 };
  keys.sort((a, b) => {
    const oa = order[groups[a].status] ?? 2;
    const ob = order[groups[b].status] ?? 2;
    if (oa !== ob) return oa - ob;
    return a.localeCompare(b, undefined, { numeric: true });
  });

  let html = '';
  for (const id of keys) {
    const g = groups[id];
    const status = g.status || 'pending';
    const model = g.model || '';
    const desc = g.description || g.desc || id;
    const duration = g.duration || '';
    const icon = statusIcon(status);

    const runningEl = status === 'running'
      ? '<div class="running-indicator"></div>'
      : `<div class="group-icon">${icon}</div>`;

    let durationText = '';
    if (duration && status === 'success') durationText = duration;
    else if (status === 'running' && g.started_at) {
      const elapsed = Math.round((Date.now() - new Date(g.started_at).getTime()) / 1000);
      const mm = Math.floor(elapsed / 60);
      const ss = elapsed % 60;
      durationText = `${mm}m ${ss}s...`;
    } else if (status === 'rate_limited') {
      durationText = g.wait ? `${g.wait}s 대기` : '대기 중';
    }

    html += `
      <div class="group-card ${status}">
        ${runningEl}
        <div class="group-info">
          <div class="group-header">
            <span class="group-id">${id}</span>
            <span class="group-model ${modelClass(model)}">${modelLabel(model)}</span>
          </div>
          <div class="group-desc" title="${desc}">${desc}</div>
        </div>
        <div class="group-duration">${durationText}</div>
      </div>`;
  }
  grid.innerHTML = html;
}

function renderQA() {
  const panel = document.getElementById('qa-panel');
  const qa = state.qa || {};
  const phase = state.phase || '';

  if (phase.startsWith('qa') || qa.active) {
    panel.classList.add('active');
    document.getElementById('qa-round').textContent = qa.round ? `${qa.round}/${qa.max_rounds || 3}` : '—';
    document.getElementById('qa-layer').textContent = qa.layer || '—';
    document.getElementById('qa-errors-found').textContent = qa.errors_found || 0;
    document.getElementById('qa-errors-fixed').textContent = qa.errors_fixed || 0;
    document.getElementById('qa-escalation').textContent = qa.escalation_level || '—';
  } else {
    panel.classList.remove('active');
  }
}

function renderLogs() {
  const body = document.getElementById('log-body');
  const logs = state.logs || [];
  const countEl = document.getElementById('log-count');
  countEl.textContent = logs.length;

  if (logs.length === 0) return;

  // Only re-render if log count changed
  if (logs.length === prevLogCount) return;

  let html = '';
  for (let i = 0; i < logs.length; i++) {
    const log = logs[i];
    let cls = '';
    if (log.includes('에러') || log.includes('실패') || log.includes('✗') || log.includes('error'))
      cls = 'error';
    else if (log.includes('완료') || log.includes('✓') || log.includes('성공') || log.includes('success'))
      cls = 'success';
    else if (log.includes('재시도') || log.includes('⚠') || log.includes('429'))
      cls = 'warn';
    else if (log.includes('시작'))
      cls = 'info';

    const isNew = i >= prevLogCount;
    html += `<div class="log-line ${cls}${isNew ? ' new' : ''}">${escapeHtml(log)}</div>`;
  }
  body.innerHTML = html;
  prevLogCount = logs.length;

  // Auto-scroll
  body.scrollTop = body.scrollHeight;
}

function renderCost() {
  const cost = state.cost?.total_usd || 0;
  document.getElementById('cost').textContent = '$' + cost.toFixed(2);
}

// ── Timer ──
function updateTimer() {
  const startedAt = state.started_at;
  if (!startedAt) return;
  const start = new Date(startedAt);
  const now = new Date();
  const diff = Math.max(0, Math.floor((now - start) / 1000));
  const mm = Math.floor(diff / 60);
  const ss = diff % 60;
  document.getElementById('elapsed').textContent = `${mm}:${ss.toString().padStart(2, '0')}`;
}

// ── Escape HTML ──
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ── Connection ──
function setConnected(val) {
  connected = val;
  const el = document.getElementById('conn-indicator');
  el.className = 'connection-indicator' + (val ? '' : ' disconnected');
  el.title = val ? 'Connected (SSE)' : 'Disconnected — polling';
}

// ── SSE Connection ──
let evtSource = null;
let pollInterval = null;

function connectSSE() {
  if (evtSource) { evtSource.close(); evtSource = null; }

  evtSource = new EventSource('/events');

  evtSource.onopen = () => {
    setConnected(true);
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  };

  evtSource.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      render(data);
    } catch (err) {
      console.error('SSE parse error:', err);
    }
  };

  evtSource.onerror = () => {
    setConnected(false);
    evtSource.close();
    evtSource = null;
    startPolling();
  };
}

function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch('/status');
      if (res.ok) {
        const data = await res.json();
        render(data);
        setConnected(true);
        // Try SSE again
        clearInterval(pollInterval);
        pollInterval = null;
        connectSSE();
      }
    } catch (e) {
      setConnected(false);
    }
  }, 3000);
}

// ── Init ──
connectSSE();

// Update timer every second
setInterval(updateTimer, 1000);

// Update running group durations every second
setInterval(() => {
  if (state.phase === 'build' || state.phase === 'merge') {
    renderGroups();
  }
}, 1000);
</script>
